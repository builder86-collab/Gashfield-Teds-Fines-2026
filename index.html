<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Fines">
<meta name="theme-color" content="#1a1a18">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Fines Tracker</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f9f9f8;
    --surface: #ffffff;
    --surface2: #f2f2f0;
    --border: rgba(0,0,0,0.09);
    --border2: rgba(0,0,0,0.18);
    --text: #1a1a18;
    --text2: #6b6b67;
    --text3: #9a9a96;
    --green: #1a7a52;
    --green-bg: #eaf5ef;
    --blue: #1a5a9a;
    --blue-bg: #e8f0fa;
    --red: #c0392b;
    --radius: 12px;
    --radius-sm: 8px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bot: env(safe-area-inset-bottom, 0px);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a18;
      --surface: #242422;
      --surface2: #2e2e2c;
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.18);
      --text: #f0f0ee;
      --text2: #a0a09c;
      --text3: #6a6a66;
      --green: #4eca8a;
      --green-bg: #0d2e1e;
      --blue: #6aaaf0;
      --blue-bg: #0d1e30;
    }
  }

  html, body {
    height: 100%;
    overscroll-behavior: none;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .app {
    max-width: 480px;
    margin: 0 auto;
    padding: calc(var(--safe-top) + 20px) 16px calc(var(--safe-bot) + 32px);
  }

  header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
  }

  .app-icon {
    width: 44px; height: 44px;
    background: var(--text);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; color: var(--bg);
    flex-shrink: 0;
  }

  header h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.3px; }
  header p { font-size: 13px; color: var(--text2); margin-top: 1px; }

  .card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 0;
    margin-bottom: 12px;
    overflow: hidden;
  }

  .field {
    padding: 13px 16px;
    border-bottom: 0.5px solid var(--border);
  }
  .field:last-child { border-bottom: none; }

  label {
    display: block; font-size: 11px; font-weight: 600;
    letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--text2); margin-bottom: 5px;
  }

  select, input[type="date"] {
    width: 100%; padding: 0;
    font-size: 16px; /* 16px prevents iOS zoom */
    background: transparent;
    border: none;
    color: var(--text);
    font-family: inherit;
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
    outline: none;
  }

  .select-wrap {
    position: relative;
  }
  .select-wrap::after {
    content: '';
    position: absolute; right: 0; top: 50%;
    transform: translateY(-50%);
    width: 12px; height: 8px;
    background: var(--text3);
    clip-path: polygon(0 0, 100% 0, 50% 100%);
    pointer-events: none;
  }

  .date-fmt { font-size: 12px; color: var(--text3); margin-top: 4px; min-height: 16px; }

  .amount-row { margin-top: 6px; min-height: 20px; display: flex; align-items: center; gap: 8px; }
  .amount-val { font-size: 13px; color: var(--text2); }
  .amount-val strong { color: var(--text); font-weight: 600; }
  .badge {
    font-size: 11px; font-weight: 500; padding: 2px 8px;
    border-radius: 20px; display: inline-block;
  }
  .badge-green { background: var(--green-bg); color: var(--green); }
  .badge-blue { background: var(--blue-bg); color: var(--blue); }

  .btn {
    width: 100%; padding: 15px;
    font-size: 16px; font-weight: 600;
    background: var(--text); color: var(--bg);
    border: none; border-radius: var(--radius);
    cursor: pointer; font-family: inherit;
    transition: opacity 0.15s, transform 0.1s;
    margin-bottom: 12px;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { transform: scale(0.97); opacity: 0.85; }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .status {
    text-align: center; font-size: 14px;
    min-height: 22px; color: var(--text3);
    padding: 0 8px;
  }
  .status.ok { color: var(--green); font-weight: 500; }
  .status.err { color: var(--red); }

  .install-hint {
    margin-top: 20px;
    padding: 12px 14px;
    background: var(--surface2);
    border-radius: var(--radius-sm);
    font-size: 12px;
    color: var(--text3);
    text-align: center;
    line-height: 1.5;
  }
  .install-hint.hidden { display: none; }

  .banner {
    width: 100%;
    height: 200px;
    object-fit: cover;
    object-position: center 20%;
    border-radius: var(--radius);
    margin-bottom: 20px;
    display: block;
  }

  .tabs {
    display: flex;
    border-bottom: 0.5px solid var(--border);
    margin-bottom: 16px;
    gap: 0;
  }
  .tab {
    flex: 1;
    padding: 10px 0;
    text-align: center;
    font-size: 13px;
    font-weight: 500;
    color: var(--text2);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
    font-family: inherit;
    transition: color 0.15s;
  }
  .tab.active {
    color: var(--text);
    border-bottom: 2px solid var(--text);
  }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  .tally-row {
    display: flex;
    align-items: center;
    padding: 11px 16px;
    border-bottom: 0.5px solid var(--border);
  }
  .tally-row:last-child { border-bottom: none; }
  .tally-rank {
    font-size: 12px;
    color: var(--text3);
    width: 24px;
    flex-shrink: 0;
  }
  .tally-name {
    flex: 1;
    font-size: 14px;
    color: var(--text);
  }
  .tally-amounts {
    text-align: right;
  }
  .tally-alltime {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
  }
  .tally-week {
    font-size: 11px;
    color: var(--text3);
    margin-top: 1px;
  }
  .tally-loading {
    text-align: center;
    color: var(--text3);
    font-size: 13px;
    padding: 24px 0;
  }
  .refresh-btn {
    font-size: 12px;
    color: var(--text3);
    background: none;
    border: none;
    cursor: pointer;
    font-family: inherit;
    padding: 0;
    float: right;
    margin-top: 2px;
  }
</style>
</head>
<body>
<div class="app" id="loginScreen">
  <img class="banner" src="banner.jpg" alt="Team photo" />
  <header>
    <div class="app-icon">$</div>
    <div>
      <h1>Fines tracker</h1>
      <p>Sign in to continue</p>
    </div>
  </header>

  <div class="card">
    <div class="field">
      <label>Your name</label>
      <div class="select-wrap">
        <select id="loginName" disabled>
          <option value="" disabled selected>Loading players...</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label id="pinLabel">PIN</label>
      <input type="password" inputmode="numeric" maxlength="4" id="loginPin" placeholder="Enter your 4-digit PIN" style="font-size:16px; background:transparent; border:none; border-bottom: 0.5px solid var(--border2); border-radius:0; padding: 8px 0; width:100%; color:var(--text); font-family:inherit;" />
      <div style="font-size:12px; color:var(--text3); margin-top:6px; min-height:16px;" id="pinHint"></div>
    </div>
  </div>

  <button class="btn" id="loginBtn" onclick="handleLogin()">Continue</button>
  <div class="status" id="loginStatus"></div>
</div>

<div class="app" id="mainScreen" style="display:none;">
  <img class="banner" src="banner.jpg" alt="Team photo" />
  <header>
    <div class="app-icon">$</div>
    <div>
      <h1>Fines tracker</h1>
      <p id="submittedBy" style="font-size:13px;color:var(--text2);margin-top:1px;"></p>
    </div>
    <button onclick="logout()" style="background:none;border:none;color:var(--text3);font-size:12px;cursor:pointer;padding:4px 8px;font-family:inherit;">Sign out</button>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('logTab', this)">Log Fine</button>
    <button class="tab" onclick="switchTab('tallyTab', this)">Tally</button>
  </div>

  <div id="logTab" class="tab-content active">

  <div class="card">
    <div class="field">
      <label>Date</label>
      <input type="date" id="dateInput" />
      <div class="date-fmt" id="dateFmt"></div>
    </div>

    <div class="field">
      <label>Fine type</label>
      <div class="select-wrap">
        <select id="fineType" onchange="onTypeChange()">
          <option value="" disabled selected>Loading...</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label>Player</label>
      <div class="select-wrap">
        <select id="player" disabled>
          <option value="" disabled selected>Loading players...</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label>Fine</label>
      <div class="select-wrap">
        <select id="fine" onchange="onFineChange()">
          <option value="" disabled selected>Select fine</option>
        </select>
      </div>
      <div class="amount-row" id="amountRow"></div>
    </div>

    <div class="field">
      <label>Multiplier <span style="font-size:10px;font-weight:400;color:var(--text3);">(optional)</span></label>
      <div class="select-wrap">
        <select id="multiplier" onchange="onFineChange()">
          <option value="1" selected>No multiplier</option>
          <option value="2">Birthday (x2)</option>
          <option value="2">Double Fines Period (x2)</option>
        </select>
      </div>
    </div>
  </div>

  <button class="btn" id="submitBtn" onclick="submitFine()">Log fine</button>
  <div class="status" id="status"></div>

  <div class="install-hint" id="installHint">
    Tip: tap Share → "Add to Home Screen" to install this as an app on your phone.
  </div>
</div>
</div>

<script>
// ─── LOGIN ───────────────────────────────────────────────
const SHEET_ID = "1Fm_QRVYlTmxAUk81gtuWJQiid8izRxRMidZDzVkZ9zQ";

async function loadPlayers() {
  const loginSel = document.getElementById('loginName');
  const playerSel = document.getElementById('player');
  try {
    // Use CSV export — no API key needed for public sheets
    const csvUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Players`;
    const res = await fetch(csvUrl);
    const text = await res.text();
    const names = text.split('\n')
      .map(r => r.replace(/"/g, '').trim())
      .filter(r => r.length > 0);

    // Populate login screen dropdown
    loginSel.innerHTML = '<option value="" disabled selected>Select your name</option>';
    names.forEach(name => {
      const opt = document.createElement('option');
      opt.value = name; opt.textContent = name;
      loginSel.appendChild(opt);
    });
    loginSel.disabled = false;

    // Populate main form player dropdown
    playerSel.innerHTML = '<option value="" disabled selected>Select player</option>';
    names.forEach(name => {
      const opt = document.createElement('option');
      opt.value = name; opt.textContent = name;
      playerSel.appendChild(opt);
    });
    playerSel.disabled = false;

  } catch(e) {
    loginSel.innerHTML = '<option value="" disabled selected>Could not load players</option>';
    loginSel.disabled = false;
    playerSel.innerHTML = '<option value="" disabled selected>Could not load players</option>';
    playerSel.disabled = false;
    console.error('Failed to load players:', e);
  }
}

const PLAYERS = []; ["Ben Nguyen","Brian Kip","Cam Stow","Dec Lumb","Des Khoo","Ben Cail","Jay Downey","Ben 'Hitman' Hart","Kurtis Rae","Jordan Chinkuli","Tom Bell","Journey","Kohby Coleman","Ben Kramer","Lachy Owen","Mark Eley","Michael Ritter","Teddy Cope","Onur Güler","Phil Kelly","Tom Bos","Wyatt Brown"];

let currentUser = null;

function getPins() {
  try { return JSON.parse(localStorage.getItem('finePins') || '{}'); } catch(e) { return {}; }
}
function savePins(pins) {
  localStorage.setItem('finePins', JSON.stringify(pins));
}

function handleLogin() {
  const name = document.getElementById('loginName').value;
  const pin = document.getElementById('loginPin').value.trim();
  const status = document.getElementById('loginStatus');

  if (!name) { status.textContent = 'Please select your name.'; status.className = 'status err'; return; }
  if (pin.length !== 4 || !/^\d{4}$/.test(pin)) { status.textContent = 'PIN must be exactly 4 digits.'; status.className = 'status err'; return; }

  const pins = getPins();

  if (!pins[name]) {
    // First time — set PIN
    pins[name] = pin;
    savePins(pins);
    currentUser = name;
    showMainScreen();
  } else if (pins[name] === pin) {
    currentUser = name;
    showMainScreen();
  } else {
    status.textContent = 'Incorrect PIN. Try again.';
    status.className = 'status err';
    document.getElementById('loginPin').value = '';
  }
}

function showMainScreen() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('mainScreen').style.display = 'block';
  document.getElementById('submittedBy').textContent = 'Logged in as ' + currentUser;
}

function logout() {
  currentUser = null;
  document.getElementById('loginScreen').style.display = 'block';
  document.getElementById('mainScreen').style.display = 'none';
  document.getElementById('loginPin').value = '';
  document.getElementById('loginStatus').textContent = '';
  document.getElementById('loginName').value = '';
  document.getElementById('pinHint').textContent = '';
}

// Update pin hint when name is selected
document.getElementById('loginName').addEventListener('change', function() {
  const pins = getPins();
  const hint = document.getElementById('pinHint');
  const label = document.getElementById('pinLabel');
  if (pins[this.value]) {
    hint.textContent = 'Welcome back — enter your PIN';
    label.textContent = 'PIN';
  } else {
    hint.textContent = 'First time? Create a 4-digit PIN';
    label.textContent = 'Create PIN';
  }
});

// Allow Enter key on PIN field
document.getElementById('loginPin').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') handleLogin();
});

// ─── LOAD FINES FROM SHEET ────────────────────────────────
async function loadFines() {
  try {
    const csvUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Fines`;
    const res = await fetch(csvUrl);
    const text = await res.text();
    const rows = text.trim().split('\n').slice(1) // skip header
      .map(r => {
        // parse CSV properly handling quoted fields
        const cols = [];
        let cur = '', inQ = false;
        for (let i = 0; i < r.length; i++) {
          if (r[i] === '"') { inQ = !inQ; }
          else if (r[i] === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
          else { cur += r[i]; }
        }
        cols.push(cur.trim());
        return cols;
      })
      .filter(r => r[0] && r[1] && r[2]);

    FINES = rows.map(r => {
      const desc = r[0];
      const type = r[1];
      const amountStr = r[2];
      const isReward = amountStr.toLowerCase() === 'free drink';
      const isDeduction = amountStr.startsWith('-');
      const amount = isReward ? 0 : parseFloat(amountStr.replace(/[^0-9.-]/g, '')) || 0;
      return {
        desc,
        type,
        amount,
        label: isReward ? 'Free drink' : amountStr,
        reward: isReward,
        deduction: isDeduction
      };
    });

    // Populate fine type dropdown with unique types from sheet
    const fineTypeEl = document.getElementById('fineType');
    const uniqueTypes = [...new Set(FINES.map(f => f.type))];
    fineTypeEl.innerHTML = '<option value="" disabled selected>Select fine type</option>';
    uniqueTypes.forEach(t => {
      const opt = document.createElement('option');
      opt.value = t; opt.textContent = t;
      fineTypeEl.appendChild(opt);
    });

    console.log(`Loaded ${FINES.length} fines, ${uniqueTypes.length} types`);
  } catch(e) {
    console.error('Failed to load fines:', e);
  }
}

// Load players on startup
loadPlayers();
loadFines();

// ─── TABS ─────────────────────────────────────────────────
function switchTab(tabId, btn) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(tabId).classList.add('active');
  btn.classList.add('active');
  if (tabId === 'tallyTab') loadTally();
}

// ─── TALLY ────────────────────────────────────────────────
async function loadTally() {
  const list = document.getElementById('tallyList');
  list.innerHTML = '<div class="tally-loading">Loading...</div>';
  try {
    const csvUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Players_Fines_Costs`;
    const res = await fetch(csvUrl);
    const text = await res.text();
    const rows = text.trim().split('\n').slice(1)
      .map(r => r.split(',').map(c => c.replace(/"/g, '').trim()))
      .filter(r => r.length >= 5 && r[2]);

    // Work out start of current week (Monday)
    const now = new Date();
    const day = now.getDay();
    const diff = (day === 0 ? -6 : 1 - day);
    const weekStart = new Date(now);
    weekStart.setDate(now.getDate() + diff);
    weekStart.setHours(0,0,0,0);

    // Tally per player
    const allTime = {}, thisWeek = {};
    rows.forEach(r => {
      const player = r[3];
      const amountStr = r[5] || '0';
      const amount = parseFloat(amountStr.replace(/[^0-9.-]/g, '')) || 0;

      // Parse date DD/MM/YY
      const dateParts = r[0].replace(/^[A-Za-z]+,\s*/, '').split('/');
      let fineDate = null;
      if (dateParts.length === 3) {
        const yr = parseInt(dateParts[2]) + 2000;
        fineDate = new Date(yr, parseInt(dateParts[1])-1, parseInt(dateParts[0]));
      }

      allTime[player] = (allTime[player] || 0) + amount;
      if (fineDate && fineDate >= weekStart) {
        thisWeek[player] = (thisWeek[player] || 0) + amount;
      }
    });

    // Sort by all-time highest
    const players = Object.keys(allTime).sort((a,b) => allTime[b] - allTime[a]);

    if (players.length === 0) {
      list.innerHTML = '<div class="tally-loading">No fines logged yet.</div>';
      return;
    }

    list.innerHTML = players.map((p, i) => `
      <div class="tally-row">
        <span class="tally-rank">${i+1}</span>
        <span class="tally-name">${p}</span>
        <div class="tally-amounts">
          <div class="tally-alltime">$${allTime[p].toFixed(2)}</div>
          <div class="tally-week">This week: $${(thisWeek[p] || 0).toFixed(2)}</div>
        </div>
      </div>`).join('');
  } catch(e) {
    list.innerHTML = '<div class="tally-loading">Could not load data. Check your connection.</div>';
    console.error(e);
  }
}

// ─── APP ─────────────────────────────────────────────────
const SHEET_URL = "https://script.google.com/macros/s/AKfycbyHGcd0iwsK6SPgTkh1nHSbaKgRjUUGsSVOMty-V6BPsv4sB-7tzGTcM_Qq86HVJ2hs9g/exec";

let FINES = [];

const DAYS = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

function formatDate(val) {
  if (!val) return "";
  const [y,m,d] = val.split("-").map(Number);
  const dt = new Date(y, m-1, d);
  return `${DAYS[dt.getDay()]}, ${String(d).padStart(2,"0")}/${String(m).padStart(2,"0")}/${String(y).slice(2)}`;
}

const dateInput = document.getElementById("dateInput");
const dateFmt = document.getElementById("dateFmt");
const today = new Date().toISOString().split("T")[0];
dateInput.value = today;
dateFmt.textContent = formatDate(today);
dateInput.addEventListener("change", () => { dateFmt.textContent = formatDate(dateInput.value); });

function onTypeChange() {
  const sel = document.getElementById("fineType").value;
  const fs = document.getElementById("fine");
  fs.innerHTML = '<option value="" disabled selected>Select fine</option>';
  document.getElementById("amountRow").innerHTML = "";
  FINES.forEach(f => {
    if (f.type === sel) {
      const o = document.createElement("option");
      o.value = f.desc; o.textContent = f.desc;
      fs.appendChild(o);
    }
  });
}

function onFineChange() {
  const desc = document.getElementById("fine").value;
  const f = FINES.find(x => x.desc === desc);
  const row = document.getElementById("amountRow");
  if (!f) { row.innerHTML = ""; return; }
  if (f.reward) {
    row.innerHTML = '<span class="badge badge-green">Reward — free drink</span>';
  } else if (f.deduction) {
    row.innerHTML = '<span class="amount-val">Amount: <strong>-$2.00</strong></span><span class="badge badge-blue">Deduction</span>';
  } else {
    row.innerHTML = `<span class="amount-val">Amount: <strong>${f.label}</strong></span>`;
  }
}

function populateAll() {
  const fs = document.getElementById("fine");
  fs.innerHTML = '<option value="" disabled selected>Select fine</option>';
  FINES.forEach(f => {
    const o = document.createElement("option");
    o.value = f.desc; o.textContent = f.desc;
    fs.appendChild(o);
  });
}
populateAll();

async function submitFine() {
  const date = formatDate(dateInput.value);
  const fineType = document.getElementById("fineType").value;
  const player = document.getElementById("player").value;
  const fineDesc = document.getElementById("fine").value;
  const statusEl = document.getElementById("status");
  const btn = document.getElementById("submitBtn");

  if (!fineType || !player || !fineDesc) {
    statusEl.textContent = "Please fill in all fields.";
    statusEl.className = "status err"; return;
  }

  const fine = FINES.find(f => f.desc === fineDesc);
  const multiplierEl = document.getElementById('multiplier');
  const multiplier = parseFloat(multiplierEl.value) || 1;
  const multiplierName = multiplierEl.options[multiplierEl.selectedIndex].text;
  let amount = fine ? fine.label : "";
  if (fine && !fine.reward && !fine.deduction && multiplier > 1) {
    amount = "$" + (fine.amount * multiplier).toFixed(2);
  }
  const multiplierUsed = multiplier > 1 ? multiplierName : "";

  btn.disabled = true;
  statusEl.textContent = "Logging...";
  statusEl.className = "status";

  const payload = { date, fineType, submittedBy: currentUser, player, fine: fineDesc, amount };
  statusEl.textContent = "Sending: " + JSON.stringify(payload);

  try {
    await fetch(SHEET_URL, {
      method: "POST", mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });
    statusEl.textContent = `Logged — ${player}, ${amount}`;
    statusEl.className = "status ok";
    document.getElementById("fineType").value = "";
    document.getElementById("player").value = "";
    document.getElementById("fine").innerHTML = '<option value="" disabled selected>Select fine</option>';
    document.getElementById("amountRow").innerHTML = "";
    populateAll();
  } catch(err) {
    statusEl.textContent = "Something went wrong. Check your connection.";
    statusEl.className = "status err";
  }
  btn.disabled = false;
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone) {
  document.getElementById('installHint').classList.add('hidden');
}
</script>
</body>
