<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Fines">
<meta name="theme-color" content="#1a1a18">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Fines Tracker</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f9f9f8;
    --surface: #ffffff;
    --surface2: #f2f2f0;
    --border: rgba(0,0,0,0.09);
    --border2: rgba(0,0,0,0.18);
    --text: #1a1a18;
    --text2: #6b6b67;
    --text3: #9a9a96;
    --green: #1a7a52;
    --green-bg: #eaf5ef;
    --blue: #1a5a9a;
    --blue-bg: #e8f0fa;
    --red: #c0392b;
    --radius: 12px;
    --radius-sm: 8px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bot: env(safe-area-inset-bottom, 0px);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a18;
      --surface: #242422;
      --surface2: #2e2e2c;
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.18);
      --text: #f0f0ee;
      --text2: #a0a09c;
      --text3: #6a6a66;
      --green: #4eca8a;
      --green-bg: #0d2e1e;
      --blue: #6aaaf0;
      --blue-bg: #0d1e30;
    }
  }

  html, body {
    height: 100%;
    overscroll-behavior: none;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .app {
    max-width: 480px;
    margin: 0 auto;
    padding: calc(var(--safe-top) + 20px) 16px calc(var(--safe-bot) + 32px);
  }

  header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
  }

  .app-icon {
    width: 44px; height: 44px;
    background: var(--text);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; color: var(--bg);
    flex-shrink: 0;
  }

  header h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.3px; }
  header p { font-size: 13px; color: var(--text2); margin-top: 1px; }

  .card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 0;
    margin-bottom: 12px;
    overflow: hidden;
  }

  .field {
    padding: 13px 16px;
    border-bottom: 0.5px solid var(--border);
  }
  .field:last-child { border-bottom: none; }

  label {
    display: block; font-size: 11px; font-weight: 600;
    letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--text2); margin-bottom: 5px;
  }

  select, input[type="date"] {
    width: 100%; padding: 0;
    font-size: 16px; /* 16px prevents iOS zoom */
    background: transparent;
    border: none;
    color: var(--text);
    font-family: inherit;
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
    outline: none;
  }

  .select-wrap {
    position: relative;
  }
  .select-wrap::after {
    content: '';
    position: absolute; right: 0; top: 50%;
    transform: translateY(-50%);
    width: 12px; height: 8px;
    background: var(--text3);
    clip-path: polygon(0 0, 100% 0, 50% 100%);
    pointer-events: none;
  }

  .date-fmt { font-size: 12px; color: var(--text3); margin-top: 4px; min-height: 16px; }

  .amount-row { margin-top: 6px; min-height: 20px; display: flex; align-items: center; gap: 8px; }
  .amount-val { font-size: 13px; color: var(--text2); }
  .amount-val strong { color: var(--text); font-weight: 600; }
  .badge {
    font-size: 11px; font-weight: 500; padding: 2px 8px;
    border-radius: 20px; display: inline-block;
  }
  .badge-green { background: var(--green-bg); color: var(--green); }
  .badge-blue { background: var(--blue-bg); color: var(--blue); }

  .btn {
    width: 100%; padding: 15px;
    font-size: 16px; font-weight: 600;
    background: var(--text); color: var(--bg);
    border: none; border-radius: var(--radius);
    cursor: pointer; font-family: inherit;
    transition: opacity 0.15s, transform 0.1s;
    margin-bottom: 12px;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { transform: scale(0.97); opacity: 0.85; }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .status {
    text-align: center; font-size: 14px;
    min-height: 22px; color: var(--text3);
    padding: 0 8px;
  }
  .status.ok { color: var(--green); font-weight: 500; }
  .status.err { color: var(--red); }

  .install-hint {
    margin-top: 20px;
    padding: 12px 14px;
    background: var(--surface2);
    border-radius: var(--radius-sm);
    font-size: 12px;
    color: var(--text3);
    text-align: center;
    line-height: 1.5;
  }
  .install-hint.hidden { display: none; }

  .banner {
    width: 100%;
    height: 200px;
    object-fit: cover;
    object-position: center 20%;
    border-radius: var(--radius);
    margin-bottom: 20px;
    display: block;
  }
</style>
</head>
<body>
<div class="app">
  <img class="banner" src="banner.jpg" alt="Team photo" />
  <header>
    <div class="app-icon">$</div>
    <div>
      <h1>Fines tracker</h1>
      <p>Log a fine to Google Sheets</p>
    </div>
  </header>

  <div class="card">
    <div class="field">
      <label>Date</label>
      <input type="date" id="dateInput" />
      <div class="date-fmt" id="dateFmt"></div>
    </div>

    <div class="field">
      <label>Fine type</label>
      <div class="select-wrap">
        <select id="fineType" onchange="onTypeChange()">
          <option value="" disabled selected>Select fine type</option>
          <option>Training</option>
          <option>Game Day or Training</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label>Player</label>
      <div class="select-wrap">
        <select id="player">
          <option value="" disabled selected>Select player</option>
          <option>Ben Nguyen</option>
          <option>Brian Kip</option>
          <option>Cam Stow</option>
          <option>Dec Lumb</option>
          <option>Des Khoo</option>
          <option>Ben Cail</option>
          <option>Jay Downey</option>
          <option>Ben 'Hitman' Hart</option>
          <option>Kurtis Rae</option>
          <option>Jordan Chinkuli</option>
          <option>Tom Bell</option>
          <option>Journey</option>
          <option>Kohby Coleman</option>
          <option>Ben Kramer</option>
          <option>Lachy Owen</option>
          <option>Mark Eley</option>
          <option>Michael Ritter</option>
          <option>Teddy Cope</option>
          <option>Onur Güler</option>
          <option>Phil Kelly</option>
          <option>Tom Bos</option>
          <option>Wyatt Brown</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label>Fine</label>
      <div class="select-wrap">
        <select id="fine" onchange="onFineChange()">
          <option value="" disabled selected>Select fine</option>
        </select>
      </div>
      <div class="amount-row" id="amountRow"></div>
    </div>
  </div>

  <button class="btn" id="submitBtn" onclick="submitFine()">Log fine</button>
  <div class="status" id="status"></div>

  <div class="install-hint" id="installHint">
    Tip: tap Share → "Add to Home Screen" to install this as an app on your phone.
  </div>
</div>

<script>
const SHEET_URL = "https://script.google.com/macros/s/AKfycbyHGcd0iwsK6SPgTkh1nHSbaKgRjUUGsSVOMty-V6BPsv4sB-7tzGTcM_Qq86HVJ2hs9g/exec";

const FINES = [
  { type:"Weekly", desc:"No fines fine", label:"$1.00" },
  { type:"Game Day or Training", desc:"Hitting the post or crossbar during training or match", label:"$2.00" },
  { type:"Game Day or Training", desc:"Wet weather fine - not turning up to training/game if it rains", label:"$2.00" },
  { type:"Game Day", desc:"Unsuccessful Hero run from a defender", label:"$2.00" },
  { type:"Game Day or Training", desc:"Nutmegged", label:"$2.00" },
  { type:"Game Day", desc:"Borrowing anything, sunscreen, tape etc.", label:"$2.00" },
  { type:"Game Day", desc:"Needing to be told more than once to listen up when the gaffer is speaking", label:"$2.00" },
  { type:"Game Day", desc:"Jewellery left on post KO whistle (when player is named in game sheet)", label:"$2.00" },
  { type:"Game Day", desc:"Not staying for a drink (alcoholic or not)", label:"$2.00" },
  { type:"Training", desc:"Last minute bail from training (<24hrs before training)", label:"$2.00" },
  { type:"Game Day", desc:"Scoring a worldie", label:"$2.00" },
  { type:"Game Day", desc:"New boots, no goal", label:"$2.00" },
  { type:"Game Day", desc:"New gloves, no clean sheet (GKs Only)", label:"$2.00" },
  { type:"Game Day", desc:"Wearing captains armband if not captain", label:"$2.00" },
  { type:"Game Day or Training", desc:"Late to training or game", label:"$2.00" },
  { type:"Game Day or Training", desc:"Complaining about being fined/arguing a fine", label:"$2.00" },
  { type:"Game Day or Training", desc:"Drinking a cruiser/WKD/UDL/Midori/cider/gin and lemonade at any point", label:"$2.00" },
  { type:"Game Day", desc:"Leaving drink unfinished", label:"$2.00" },
  { type:"Game Day or Training", desc:"Haircut fine: caught having had a haircut in the last week", label:"$2.00" },
  { type:"Game Day", desc:"Not submitting MVP votes in a timely manner (i.e. 6pm game day)", label:"$2.00" },
  { type:"Game Day", desc:"Not bringing a chair for your spectator/supporter", label:"$2.00" },
  { type:"Game Day", desc:"Fruit and/or salad fine", label:"$2.00" },
  { type:"Game Day", desc:'The "Samir" Fine - backheel that doesn\'t reach a teammate', label:"$2.00" },
  { type:"Game Day", desc:"Foul throw", label:"$2.00" },
  { type:"Game Day or Training", desc:"Tommy Bell Fine (misc. TeamApp RSVP shenanigans)", label:"$2.00" },
  { type:"Training", desc:"Last minute bail from game without due reason (inside 24hrs)", label:"$2.00" },
  { type:"Training", desc:"Not providing RSVP for training or game by Tuesday 6pm", label:"$2.00" },
  { type:"Training", desc:"Forgetting gear at the ground after game/training", label:"$2.00" },
  { type:"Game Day", desc:"Phone going off in a dressing room (emergencies excluded)", label:"$2.00" },
  { type:"Game Day or Training", desc:"Forgetting bib", label:"$2.00" },
  { type:"Training", desc:"Full kit wanker at training (unless all club attire)", label:"$2.00" },
  { type:"Game Day", desc:"Marky (Missing 1v1/close range goal)", label:"$2.00" },
  { type:"Game Day", desc:"Wardy (Cramping up)", label:"$2.00" },
  { type:"Game Day", desc:"Doing dumb shit when drunk at a squad/club event (voted by those attending)", label:"$2.00" },
  { type:"Game Day", desc:"2 goals, no hattrick (stackable)", label:"$2.00" },
  { type:"Game Day", desc:"Defender/Last man taking on a striker and losing", label:"$2.00" },
  { type:"Game Day", desc:"Celebrity, appearing in any news outlet publication (club mag included)", label:"$2.00" },
  { type:"Game Day", desc:"Forgetting any sort of gear to the match (socks, shorts, shinnies etc) - PER ITEM", label:"$2.00" },
  { type:"Game Day", desc:"Excessive celebration", label:"$2.00" },
  { type:"Game Day", desc:"Having a penalty saved (shot on target)", label:"$2.00" },
  { type:"Game Day", desc:"Shocking Banter Fine (Team vote on banter that falls flat)", label:"$2.00" },
  { type:"Training", desc:"Wild Ted Spotting - snap a pic and send to group", label:"$5.00" },
  { type:"Game Day", desc:"Missing a penalty (shot off target)", label:"$5.00" },
  { type:"Training", desc:"No Show/Excessively late to training or game (after kickoff)", label:"$5.00" },
  { type:"Game Day", desc:"Dive", label:"$5.00" },
  { type:"Game Day", desc:"Yellow Card", label:"$5.00" },
  { type:"Game Day", desc:"Captain not handing over armband if not playing that round", label:"$5.00" },
  { type:"Game Day", desc:"Turning up hungover to the game and not performing because of it", label:"$5.00" },
  { type:"Game Day", desc:"Giving away a penalty", label:"$5.00" },
  { type:"Game Day", desc:"Excessive arguing with the referee", label:"$5.00" },
  { type:"Game Day", desc:"Own Goal", label:"$5.00" },
  { type:"Game Day", desc:"Dogging the boys", label:"$5.00" },
  { type:"Game Day", desc:"Dummy Spit/Carrying On Fine", label:"$5.00" },
  { type:"Game Day", desc:"Excessive Negativity Fine", label:"$5.00" },
  { type:"Game Day or Training", desc:"Dangerous tackle", label:"$10.00" },
  { type:"Game Day", desc:"Red card", label:"$20.00" },
  { type:"Game Day", desc:"Having to go to tribunal", label:"$40.00" },
  { type:"Game Day", desc:"Goal line clearance - $2 off that week's fines", label:"-$2.00", deduction:true },
  { type:"Reward", desc:"Free drink - keeper saves a penalty (player who gives it away buys)", label:"Free drink", reward:true },
  { type:"Reward", desc:"Free drink - Hat trick (Gaffer buys)", label:"Free drink", reward:true },
  { type:"Reward", desc:"Free drink - Last minute winner", label:"Free drink", reward:true },
];

const DAYS = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

function formatDate(val) {
  if (!val) return "";
  const [y,m,d] = val.split("-").map(Number);
  const dt = new Date(y, m-1, d);
  return `${DAYS[dt.getDay()]}, ${String(d).padStart(2,"0")}/${String(m).padStart(2,"0")}/${String(y).slice(2)}`;
}

const dateInput = document.getElementById("dateInput");
const dateFmt = document.getElementById("dateFmt");
const today = new Date().toISOString().split("T")[0];
dateInput.value = today;
dateFmt.textContent = formatDate(today);
dateInput.addEventListener("change", () => { dateFmt.textContent = formatDate(dateInput.value); });

function onTypeChange() {
  const sel = document.getElementById("fineType").value;
  const fs = document.getElementById("fine");
  fs.innerHTML = '<option value="" disabled selected>Select fine</option>';
  document.getElementById("amountRow").innerHTML = "";
  FINES.forEach(f => {
    const show = f.type === sel || f.type === "Weekly" || f.type === "Reward" ||
      f.type === "Game Day or Training" ||
      (sel === "Training" && f.type === "Training");
    if (show) {
      const o = document.createElement("option");
      o.value = f.desc; o.textContent = f.desc;
      fs.appendChild(o);
    }
  });
}

function onFineChange() {
  const desc = document.getElementById("fine").value;
  const f = FINES.find(x => x.desc === desc);
  const row = document.getElementById("amountRow");
  if (!f) { row.innerHTML = ""; return; }
  if (f.reward) {
    row.innerHTML = '<span class="badge badge-green">Reward — free drink</span>';
  } else if (f.deduction) {
    row.innerHTML = '<span class="amount-val">Amount: <strong>-$2.00</strong></span><span class="badge badge-blue">Deduction</span>';
  } else {
    row.innerHTML = `<span class="amount-val">Amount: <strong>${f.label}</strong></span>`;
  }
}

function populateAll() {
  const fs = document.getElementById("fine");
  fs.innerHTML = '<option value="" disabled selected>Select fine</option>';
  FINES.forEach(f => {
    const o = document.createElement("option");
    o.value = f.desc; o.textContent = f.desc;
    fs.appendChild(o);
  });
}
populateAll();

async function submitFine() {
  const date = formatDate(dateInput.value);
  const fineType = document.getElementById("fineType").value;
  const player = document.getElementById("player").value;
  const fineDesc = document.getElementById("fine").value;
  const statusEl = document.getElementById("status");
  const btn = document.getElementById("submitBtn");

  if (!fineType || !player || !fineDesc) {
    statusEl.textContent = "Please fill in all fields.";
    statusEl.className = "status err"; return;
  }

  const fine = FINES.find(f => f.desc === fineDesc);
  const amount = fine ? fine.label : "";

  btn.disabled = true;
  statusEl.textContent = "Logging...";
  statusEl.className = "status";

  try {
    await fetch(SHEET_URL, {
      method: "POST", mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ date, fineType, player, fine: fineDesc, amount })
    });
    statusEl.textContent = `Logged — ${player}, ${amount}`;
    statusEl.className = "status ok";
    document.getElementById("fineType").value = "";
    document.getElementById("player").value = "";
    document.getElementById("fine").innerHTML = '<option value="" disabled selected>Select fine</option>';
    document.getElementById("amountRow").innerHTML = "";
    populateAll();
  } catch(err) {
    statusEl.textContent = "Something went wrong. Check your connection.";
    statusEl.className = "status err";
  }
  btn.disabled = false;
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone) {
  document.getElementById('installHint').classList.add('hidden');
}
</script>
</body>
</html>
